name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ubuntu:
    name: Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["24.04", "26.04"]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential iproute2 pkg-config libgtk-4-dev libadwaita-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

      - name: Install locally
        run: cargo install --path . --force --root "$HOME/.local" --locked

      - name: Doctor
        run: "$HOME/.local/bin/port-killer" doctor

      - name: CLI smoke
        run: |
          "$HOME/.local/bin/port-killer" status
          "$HOME/.local/bin/port-killer" list | grep -q '"text"'
